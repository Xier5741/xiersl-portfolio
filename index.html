<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Xier Lin — Engineering Portfolio</title>
<style>
:root{
  --bg:#f9f8f6;--white:#fff;--text:#1a1a1a;--muted:#6b7280;
  --light:#e8e4de;--accent:#c0410a;--border:#e2ddd7;
  --font:'Georgia',serif;--sans:'Helvetica Neue',Arial,sans-serif;
  --contact-bg:#2b2b2b;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.6}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:58px}
.logo-mark{width:36px;height:36px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.85rem;letter-spacing:.5px;transition:color .2s;cursor:pointer}
.nav-links a:hover{color:var(--text)}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* HERO */
#hero-sec{padding:100px 60px 80px;max-width:900px}
.hero-eyebrow{font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--muted)}
h1.hero-name{font-family:var(--font);font-size:clamp(3rem,7vw,5.6rem);font-weight:400;line-height:1.05;letter-spacing:-1px;margin-bottom:28px}
h1.hero-name em{font-style:italic;color:var(--accent)}
.hero-desc{font-size:1.1rem;color:var(--muted);max-width:520px;line-height:1.8;margin-bottom:40px}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap}
.btn{padding:11px 26px;font-size:.85rem;font-weight:600;border-radius:2px;text-decoration:none;letter-spacing:.5px;transition:all .2s;cursor:pointer;border:none;display:inline-block}
.btn-dark{background:var(--text);color:#fff}
.btn-dark:hover{background:#333}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--text)}
.btn-outline:hover{background:var(--text);color:#fff}

/* STRIP */
.summary-strip{display:flex;border-bottom:1px solid var(--border)}
.sw-col{flex:1;padding:48px 60px;border-right:1px solid var(--border)}
.sw-col:last-child{border-right:none}
.sw-col h3{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.sw-col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.sw-col li{font-size:.95rem;padding-left:16px;position:relative;line-height:1.5}
.sw-col li::before{content:'—';position:absolute;left:0;color:var(--accent)}

/* SECTION EYEBROW */
.section-eyebrow{font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:48px;display:flex;align-items:center;gap:14px}
.section-eyebrow::after{content:'';flex:1;height:1px;background:var(--border)}

/* EXPERIENCE */
.exp-list{display:flex;flex-direction:column}
.exp-item{display:grid;grid-template-columns:160px 1fr;gap:40px;padding:32px 0;border-bottom:1px solid var(--border);align-items:start;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
.exp-item.visible{opacity:1;transform:none}
.exp-date{font-size:.78rem;color:var(--muted);margin-bottom:4px}
.exp-loc{font-size:.78rem;color:var(--muted)}
.exp-body h4{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.company{font-size:.85rem;color:var(--accent);font-weight:600;margin-bottom:10px;letter-spacing:.3px}
.exp-body p{font-size:.92rem;color:var(--muted);line-height:1.75;max-width:540px}
.exp-body ul{margin-top:8px;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:6px}
.exp-body ul li{font-size:.88rem;color:var(--muted);padding-left:14px;position:relative;line-height:1.65}
.exp-body ul li::before{content:'–';position:absolute;left:0;color:var(--accent)}

/* PROJECTS */
#proj-sec{padding:80px 60px}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.proj-item{background:var(--white);overflow:hidden;cursor:pointer;position:relative;opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.proj-item.visible{opacity:1;transform:none}
.proj-thumb{width:100%;aspect-ratio:4/3;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:3rem;transition:transform .5s;overflow:hidden}
.proj-item:hover .proj-thumb{transform:scale(1.04)}
.proj-info{padding:20px 22px 24px}
.proj-cat{font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.proj-info h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.proj-info p{font-size:.83rem;color:var(--muted);line-height:1.65}
.proj-item::after{content:'↗';position:absolute;top:16px;right:16px;width:30px;height:30px;background:var(--text);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;opacity:0;transform:scale(.7);transition:opacity .2s,transform .2s}
.proj-item:hover::after{opacity:1;transform:scale(1)}

/* ABOUT */
#about-sec{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.about-left{padding:80px 60px;border-right:1px solid var(--border)}
.about-right{padding:80px 60px;background:var(--white)}
.about-right h2{font-family:var(--font);font-size:clamp(2rem,4vw,3rem);font-weight:400;line-height:1.2;margin-bottom:28px}
.about-right h2 em{font-style:italic;color:var(--accent)}
.about-right p{font-size:.95rem;color:var(--muted);line-height:1.85;margin-bottom:18px}
.interests{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}
.tag{padding:6px 14px;border:1px solid var(--border);border-radius:2px;font-size:.78rem;color:var(--muted)}
.about-avatar-box{width:100%;aspect-ratio:1;background:var(--light);border-radius:4px;overflow:hidden;margin-bottom:28px}
.about-avatar-box img{width:100%;height:100%;object-fit:cover}
.about-stat{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--border)}
.about-stat:first-of-type{border-top:1px solid var(--border)}
.stat-label{font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.stat-val{font-family:var(--font);font-size:1.5rem;font-weight:400}

/* CONTACT */
#contact-sec{padding:100px 60px;background:var(--contact-bg);color:#fff}
.contact-inner{display:grid;grid-template-columns:1.4fr 1fr;gap:80px;max-width:1000px;margin:0 auto;align-items:start}
.contact-form-col .section-eyebrow{color:rgba(255,255,255,.35)}
.contact-form-col .section-eyebrow::after{background:rgba(255,255,255,.12)}
.contact-form-col h2{font-family:var(--font);font-size:clamp(2.2rem,5vw,3.8rem);font-weight:400;line-height:1.1;margin-bottom:16px}
.contact-form-col h2 em{font-style:italic;color:#f97316}
.contact-form-col>p{color:rgba(255,255,255,.45);font-size:.95rem;line-height:1.8;margin-bottom:36px}
.contact-form{display:flex;flex-direction:column;gap:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.form-group input,.form-group textarea{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:2px;padding:12px 14px;color:#fff;font-family:var(--sans);font-size:.92rem;outline:none;transition:border-color .2s;resize:none}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,.2)}
.form-group input:focus,.form-group textarea:focus{border-color:rgba(255,255,255,.35)}
.contact-info-col{padding-top:8px}
.contact-info-col h3{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.contact-info-item{padding:20px 0;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:16px}
.ci-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-icon svg{width:22px;height:22px}
.ci-text{}
.ci-label{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:3px}
.ci-val{font-size:.92rem;color:#fff;text-decoration:none;line-height:1.5;display:block}
a.ci-val:hover{color:#f97316}

/* FOOTER */
footer{background:var(--contact-bg);border-top:1px solid rgba(255,255,255,.08);padding:24px 60px;display:flex;justify-content:space-between;align-items:center}
footer span{font-size:.78rem;color:rgba(255,255,255,.3);letter-spacing:.5px}

/* DETAIL PAGE */
#detail-page{background:var(--bg)}
.detail-back{padding:18px 60px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.82rem;color:var(--muted);letter-spacing:.5px;transition:color .2s}
.detail-back:hover{color:var(--text)}
.detail-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.detail-hero{padding:80px 60px 60px;max-width:860px}
.detail-cat{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.detail-hero h2{font-family:var(--font);font-size:clamp(2.2rem,5vw,3.8rem);font-weight:400;line-height:1.1;margin-bottom:20px}
.detail-hero .detail-sub{font-size:1rem;color:var(--muted);max-width:600px;line-height:1.85}
.detail-skills{display:flex;flex-wrap:wrap;gap:8px;padding:0 60px 48px}
.skill-pill{padding:6px 16px;border:1px solid var(--border);border-radius:2px;font-size:.75rem;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.detail-content{padding:0 60px 80px;max-width:900px}
.detail-section{margin-bottom:64px}
.detail-section h3{font-family:var(--font);font-size:1.6rem;font-weight:400;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.detail-section p{font-size:.95rem;color:var(--muted);line-height:1.85;margin-bottom:16px}
.detail-section ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.detail-section ul li{font-size:.93rem;color:var(--muted);padding-left:18px;position:relative;line-height:1.7}
.detail-section ul li::before{content:'—';position:absolute;left:0;color:var(--accent)}
.detail-img
